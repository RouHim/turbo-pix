<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200">
  <defs>
    <style>
      .pixel { shape-rendering: crispEdges; }
      .title {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        font-size: 64px;
        font-weight: 700;
        fill: #e8e0d4;
      }
      .subtitle {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        font-size: 16px;
        font-weight: 400;
        fill: #8a9baf;
      }
      .tagline {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        font-size: 14px;
        font-weight: 600;
        fill: #b89b5e;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="600" height="200" fill="transparent"/>

  <!-- Centered group -->
  <g transform="translate(85, 50)">
    <!-- Icon background -->
    <rect width="100" height="100" fill="#1e2228" rx="12" stroke="#2a3340" stroke-width="1"/>

    <!-- 8-bit pixel art style photo grid -->
    <g class="pixel">
      <!-- 3x3 photo grid -->
      <rect x="18" y="18" width="16" height="16" fill="#7b8fa8"/>
      <rect x="38" y="18" width="16" height="16" fill="#6a7d96"/>
      <rect x="58" y="18" width="16" height="16" fill="#596b84"/>

      <rect x="18" y="38" width="16" height="16" fill="#6a7d96"/>
      <rect x="38" y="38" width="16" height="16" fill="#596b84"/>
      <rect x="58" y="38" width="16" height="16" fill="#7b8fa8"/>

      <rect x="18" y="58" width="16" height="16" fill="#596b84"/>
      <rect x="38" y="58" width="16" height="16" fill="#7b8fa8"/>
      <rect x="58" y="58" width="16" height="16" fill="#6a7d96"/>

      <!-- Speed/turbo lines -->
      <rect x="12" y="78" width="10" height="6" fill="#b89b5e"/>
      <rect x="24" y="78" width="12" height="6" fill="#b89b5e"/>
      <rect x="40" y="78" width="16" height="6" fill="#b89b5e"/>
      <rect x="58" y="78" width="18" height="6" fill="#b89b5e"/>

      <!-- Highlight pixels for retro glow effect -->
      <rect x="20" y="20" width="3" height="3" fill="#ffffff" opacity="0.4"/>
      <rect x="40" y="20" width="3" height="3" fill="#ffffff" opacity="0.4"/>
      <rect x="60" y="20" width="3" height="3" fill="#ffffff" opacity="0.4"/>
    </g>

    <!-- Text positioned next to icon -->
    <text x="124" y="52" class="title">TurboPix</text>
    <text x="126" y="78" class="subtitle">A straightforward photo and video viewer</text>
    <text x="126" y="98" class="tagline">Fast. Simple. Self-hosted.</text>
  </g>
</svg>
